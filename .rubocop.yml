AllCops:
  NewCops: enable
  SuggestExtensions: false

plugins:
  - rubocop-rspec

# TODO: Deal with the mess at some point

Metrics/BlockLength:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false
